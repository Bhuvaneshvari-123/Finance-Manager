<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Welcome to Finance Manager!</h1>
        <div id="balance-container">
            <h2>Current Balance: <span id="balance">₹0.00</span></h2>
        </div>
        <div class="menu">
            <button onclick="addIncome()">Add Income</button>
            <button onclick="recordExpense()">Record Expense</button>
            <button onclick="viewSummary()">View Transaction Summary</button>
        </div>

        <div id="transactions-container">
            <h3>Transaction Summary</h3>
            <ul id="transactions-list">
                <!-- Transactions will be listed here -->
            </ul>
        </div>

        <!-- Modal for adding income -->
        <div id="income-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('income-modal')">&times;</span>
                <h2>Add Income</h2>
                <input type="number" id="income-amount" placeholder="Enter income amount" />
                <button onclick="submitIncome()">Submit</button>
            </div>
        </div>

        <!-- Modal for recording expenses -->
        <div id="expense-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('expense-modal')">&times;</span>
                <h2>Record Expense</h2>
                <input type="number" id="expense-amount" placeholder="Enter expense amount" />
                <input type="text" id="expense-category" placeholder="Expense category (e.g., Rent)" />
                <button onclick="submitExpense()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;
        let transactions = [];

        function updateBalance() {
            document.getElementById('balance').textContent = `₹${balance.toFixed(2)}`;
        }

        function saveTransactions() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function loadTransactions() {
            const savedTransactions = localStorage.getItem('transactions');
            if (savedTransactions) {
                transactions = JSON.parse(savedTransactions);
                transactions.forEach(transaction => {
                    if (transaction.type === 'income') {
                        balance += transaction.amount;
                    } else if (transaction.type === 'expense') {
                        balance -= transaction.amount;
                    }
                });
            }
        }

        function addIncome() {
            const incomeModal = document.getElementById('income-modal');
            incomeModal.style.display = 'block';
        }

        function submitIncome() {
            const incomeAmount = parseFloat(document.getElementById('income-amount').value);
            if (!isNaN(incomeAmount) && incomeAmount > 0) {
                balance += incomeAmount;
                transactions.push({ type: 'income', amount: incomeAmount });
                updateBalance();
                displayTransactions();
                saveTransactions();
                closeModal('income-modal');
            }
        }

        function recordExpense() {
            const expenseModal = document.getElementById('expense-modal');
            expenseModal.style.display = 'block';
        }

        function submitExpense() {
            const expenseAmount = parseFloat(document.getElementById('expense-amount').value);
            const expenseCategory = document.getElementById('expense-category').value;
            if (!isNaN(expenseAmount) && expenseAmount > 0 && expenseCategory) {
                balance -= expenseAmount;
                transactions.push({ type: 'expense', amount: expenseAmount, category: expenseCategory });
                updateBalance();
                displayTransactions();
                saveTransactions();
                closeModal('expense-modal');
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function displayTransactions() {
            const transactionsList = document.getElementById('transactions-list');
            transactionsList.innerHTML = '';
            transactions.forEach((transaction, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = `${transaction.type === 'income' ? 'Income' : 'Expense'}: ₹${transaction.amount.toFixed(2)} ${transaction.category ? `(${transaction.category})` : ''}`;

                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Delete';
                deleteButton.onclick = () => deleteTransaction(index);

                listItem.appendChild(deleteButton);
                transactionsList.appendChild(listItem);
            });
        }

        function deleteTransaction(index) {
            const transaction = transactions[index];
            if (transaction.type === 'income') {
                balance -= transaction.amount;
            } else if (transaction.type === 'expense') {
                balance += transaction.amount;
            }
            transactions.splice(index, 1);
            updateBalance();
            displayTransactions();
            saveTransactions();
        }

        function viewSummary() {
            displayTransactions();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTransactions();
            updateBalance();
            displayTransactions();
        });
    </script>
</body>
</html>
